<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion de categorias y anomalias</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f3f4f8; color: #1a1a2e; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .actions { display: flex; gap: 10px; }
        .btn { text-decoration: none; background: #3266ad; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 14px; border: none; cursor: pointer; }
        .btn-danger { background: #b53a3a; }
        .btn-secondary { background: #777; }
        .message { margin-bottom: 1rem; padding: 12px 14px; border-radius: 8px; font-size: 14px; }
        .success { background: #edf8f1; border: 1px solid #b8e0c2; color: #2d7a55; }
        .error { background: #fff4f0; border: 1px solid #f5c4b3; color: #993c1d; }
        .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #eaeef5; text-align: left; vertical-align: top; }
        th { background: #3266ad; color: #fff; }
        form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        input { padding: 8px 10px; border: 1px solid #d7dce5; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <h1>Gestion de categorias y anomalias</h1>
        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/dashboard}">Volver al dashboard</a>
        </div>
    </div>

    <div th:if="${success}" class="message success" th:text="${success}"></div>
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <div class="card">
        <h2 style="margin-top:0;">Crear categoria/anomalia</h2>
        <form th:action="@{/dashboard/categorias-anomalias/create}" method="post">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="codigo" placeholder="Codigo" required>
            <button type="submit" class="btn">Crear</button>
        </form>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Codigo</th>
            <th>Editar</th>
            <th>Eliminar</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="categoria : ${categorias}">
            <td th:text="${categoria.id}">1</td>
            <td th:text="${categoria.nombre}">Soplo sistolico</td>
            <td th:text="${categoria.codigo}">SS</td>
            <td>
                <form th:action="@{/dashboard/categorias-anomalias/{id}/edit(id=${categoria.id})}" method="post">
                    <input type="text" name="nombre" th:value="${categoria.nombre}" required>
                    <input type="text" name="codigo" th:value="${categoria.codigo}" required>
                    <button type="submit" class="btn">Guardar</button>
                </form>
            </td>
            <td>
                <form th:action="@{/dashboard/categorias-anomalias/{id}/delete(id=${categoria.id})}" method="post"
                      onsubmit="return confirm('Seguro que deseas eliminar esta categoria?');">
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
