<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <title>Gestión de instituciones · Panel administrativo</title>

    <!-- Tailwind CSS + Configuración extendida (mismos colores brand) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui']
                    },
                    colors: {
                        brand: {
                            50: '#f4f8fb',
                            100: '#e8f0f7',
                            200: '#d4e4f0',
                            300: '#aecedf',
                            400: '#7faec8',
                            500: '#568eaf',
                            600: '#3d7293',
                            700: '#2f5b77',
                            800: '#284b63',
                            900: '#243f53'
                        }
                    },
                    boxShadow: {
                        soft: '0 18px 45px rgba(36, 63, 83, 0.08)',
                        card: '0 12px 30px rgba(36, 63, 83, 0.07)'
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body {
            background: radial-gradient(circle at top left, rgba(212, 228, 240, 0.4) 0%, #ffffff 70%);
        }
        *:focus-visible {
            outline: 2px solid #3d7293;
            outline-offset: 2px;
            border-radius: 8px;
        }
        .card-hover {
            transition: all 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.08);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #eef2f6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #7faec8; border-radius: 10px; }
    </style>
</head>
<body class="font-sans text-slate-700 antialiased">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">
    <!-- Encabezado con navegación -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8 pb-3 border-b border-slate-200">
        <div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-brand-900 flex items-center gap-2">
                <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
                Gestión de instituciones
            </h1>
            <p class="text-sm text-slate-500 mt-1">Administra hospitales, clínicas y centros médicos</p>
        </div>
        <div class="flex flex-wrap gap-3">

            <a th:href="@{/dashboard}" 
               class="inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition-all hover:border-brand-300 hover:text-brand-800">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                Volver al dashboard
            </a>
        </div>
    </div>

    <!-- Mensajes flash (se mostrarán con SweetAlert automáticamente) -->
    <div th:if="${success}" id="flashSuccess" th:data-message="${success}" class="hidden"></div>
    <div th:if="${error}" id="flashError" th:data-message="${error}" class="hidden"></div>

    <!-- Datos para manejo de eliminación pendiente (dependencias) -->
    <div th:if="${pendingDeleteInstitutionId != null}" id="pendingDeleteData" 
         th:data-institutionid="${pendingDeleteInstitutionId}"
         th:data-has-consultorios="${pendingDeleteHasConsultorios}"
         th:data-has-diagnostics="${pendingDeleteHasDiagnostics}"
         th:data-diagnostics-count="${pendingDiagnosticsCount}"
         class="hidden"></div>

    <!-- Tarjeta: Crear institución -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-card p-6 md:p-7 mb-8 card-hover">
        <h2 class="text-xl font-extrabold text-slate-900 flex items-center gap-2 mb-5">
            <svg class="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            Nueva institución
        </h2>
        <form id="createInstitutionForm" th:action="@{/dashboard/instituciones/create}" method="post" class="flex flex-col sm:flex-row gap-4 items-end">
            <div class="flex-1 w-full">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Nombre de la institución</label>
                <input type="text" name="nombre" id="createNombre" placeholder="Ej. Hospital Universitario" required
                       class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-400 focus:ring-brand-300 transition">
            </div>
            <button type="submit" class="inline-flex items-center gap-2 rounded-xl bg-brand-800 px-6 py-2.5 text-sm font-bold text-white shadow-md hover:bg-brand-700 transition-all hover:-translate-y-0.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Crear institución
            </button>
        </form>
    </div>

    <!-- Tabla de instituciones (responsiva) -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-card overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-brand-800">
                    <tr>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">ID</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Nombre</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Estado</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Editar</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Consultorios</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Eliminar</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 bg-white">
                    <tr th:each="inst : ${instituciones}" class="hover:bg-slate-50 transition">
                        <td class="px-5 py-4 text-sm font-medium text-slate-900" th:text="${inst.id}">1</td>
                        <td class="px-5 py-4 text-sm font-medium" th:text="${inst.nombre}">Hospital Central</td>
                        <td class="px-5 py-4 text-sm">
                            <span th:class="${inst.activo} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800' + ' px-2 py-1 rounded-full text-xs font-semibold'"
                                  th:text="${inst.activo} ? 'Activo' : 'Inactivo'">Activo</span>
                        </td>
                        <!-- Formulario de edición -->
                        <td class="px-5 py-4">
                            <form class="editInstitutionForm" th:action="@{/dashboard/instituciones/{id}/edit(id=${inst.id})}" method="post" th:data-id="${inst.id}">
                                <div class="flex flex-col sm:flex-row gap-2 items-start sm:items-center">
                                    <input type="text" name="nombre" th:value="${inst.nombre}" required
                                           class="rounded-lg border-slate-200 text-sm w-32 md:w-40 focus:ring-brand-300">
                                    <select name="activo" class="rounded-lg border-slate-200 text-sm bg-white">
                                        <option value="true" th:selected="${inst.activo}">Activo</option>
                                        <option value="false" th:selected="${!inst.activo}">Inactivo</option>
                                    </select>
                                    <button type="submit" class="edit-btn inline-flex items-center gap-1 rounded-lg bg-brand-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-brand-700 transition">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                        Guardar
                                    </button>
                                </div>
                            </form>
                        </td>
                        <!-- Botón Gestionar consultorios -->
                        <td class="px-5 py-4">
                            <a th:href="@{/dashboard/instituciones/{id}/consultorios(id=${inst.id})}" 
                               class="inline-flex items-center gap-1 rounded-lg bg-slate-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-slate-700 transition">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                                Consultorios
                            </a>
                        </td>
                        <!-- Eliminar (formulario simple, el handler usará SweetAlert) -->
                        <td class="px-5 py-4">
                            <form class="deleteInstitutionForm" th:action="@{/dashboard/instituciones/{id}/delete(id=${inst.id})}" method="post" th:data-id="${inst.id}">
                                <button type="submit" class="delete-btn inline-flex items-center gap-1 rounded-lg bg-red-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-red-700 transition">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${instituciones.isEmpty()}">
                        <td colspan="6" class="px-5 py-8 text-center text-slate-400">No hay instituciones registradas</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        // Helper: mostrar toast (notificación flotante)
        function showToast(icon, title, text = '') {
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: icon,
                title: title,
                text: text,
                showConfirmButton: false,
                timer: 4000,
                timerProgressBar: true,
                background: '#fff',
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer);
                    toast.addEventListener('mouseleave', Swal.resumeTimer);
                }
            });
        }

        // Mostrar mensajes flash (success/error)
        const flashSuccess = document.getElementById('flashSuccess');
        if(flashSuccess && flashSuccess.dataset.message) {
            showToast('success', '¡Éxito!', flashSuccess.dataset.message);
        }
        const flashError = document.getElementById('flashError');
        if(flashError && flashError.dataset.message) {
            showToast('error', 'Error', flashError.dataset.message);
        }

        // ---------- MANEJO DE ELIMINACIÓN PENDIENTE (DEPENDENCIAS) ----------
        const pendingData = document.getElementById('pendingDeleteData');
        if(pendingData && pendingData.dataset.institutionid) {
            const instId = pendingData.dataset.institutionid;
            const hasConsultorios = pendingData.dataset.hasConsultorios === 'true';
            const hasDiagnostics = pendingData.dataset.hasDiagnostics === 'true';
            const diagCount = pendingData.dataset.diagnosticsCount || 0;

            // Construir mensaje y opciones según flags
            let htmlContent = `<div class="text-left">`;
            if(hasConsultorios) htmlContent += `<p class="mb-2">⚠️ Esta institución tiene <strong>consultorios activos</strong>.</p>`;
            if(hasDiagnostics) htmlContent += `<p class="mb-2">⚠️ Esta institución tiene <strong>${diagCount} diagnóstico(s) asociado(s)</strong>.</p>`;
            htmlContent += `<p class="text-sm text-slate-500 mt-3">Para eliminar la institución, debes elegir una de las siguientes opciones:</p></div>`;

            // Definir botones dinámicamente
            let buttons = [];
            if(hasConsultorios && !hasDiagnostics) {
                buttons.push({
                    text: 'Eliminar institución y consultorios',
                    value: 'deleteWithConsultorios',
                    color: '#b53a3a'
                });
            }
            if(hasDiagnostics) {
                buttons.push({
                    text: hasConsultorios ? 'Eliminar institución, consultorios y diagnósticos' : 'Eliminar institución y diagnósticos',
                    value: 'deleteWithDiagnostics',
                    color: '#b53a3a'
                });
                buttons.push({
                    text: hasConsultorios ? 'Reasignar diagnósticos a NO INFORMADA y eliminar institución + consultorios' : 'Reasignar diagnósticos a NO INFORMADA y eliminar institución',
                    value: 'reassignDiagnostics',
                    color: '#2f5b77'
                });
            }
            if(buttons.length === 0) {
                // No debería ocurrir porque si no hay dependencias, no entraría aquí, pero por seguridad:
                window.location.href = '/dashboard/instituciones';
                return;
            }

            // Mostrar modal con opciones personalizadas
            Swal.fire({
                title: 'Eliminación con dependencias',
                html: htmlContent,
                icon: 'warning',
                showCancelButton: true,
                cancelButtonText: 'Cancelar',
                confirmButtonText: buttons[0].text,
                confirmButtonColor: buttons[0].color,
                showDenyButton: buttons.length > 1,
                denyButtonText: buttons.length > 1 ? buttons[1].text : undefined,
                denyButtonColor: buttons.length > 1 ? buttons[1].color : undefined,
                showCloseButton: true
            }).then((result) => {
                let action = null;
                if(result.isConfirmed) action = buttons[0].value;
                else if(result.isDenied && buttons.length > 1) action = buttons[1].value;
                if(action) {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = `/dashboard/instituciones/${instId}/delete`;
                    if(action === 'deleteWithConsultorios') {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = 'deleteConsultorios';
                        input.value = 'true';
                        form.appendChild(input);
                    } else if(action === 'deleteWithDiagnostics') {
                        if(hasConsultorios) {
                            const inputCons = document.createElement('input');
                            inputCons.type = 'hidden';
                            inputCons.name = 'deleteConsultorios';
                            inputCons.value = 'true';
                            form.appendChild(inputCons);
                        }
                        const inputDiag = document.createElement('input');
                        inputDiag.type = 'hidden';
                        inputDiag.name = 'deleteDiagnostics';
                        inputDiag.value = 'true';
                        form.appendChild(inputDiag);
                    } else if(action === 'reassignDiagnostics') {
                        if(hasConsultorios) {
                            const inputCons = document.createElement('input');
                            inputCons.type = 'hidden';
                            inputCons.name = 'deleteConsultorios';
                            inputCons.value = 'true';
                            form.appendChild(inputCons);
                        }
                        const inputReas = document.createElement('input');
                        inputReas.type = 'hidden';
                        inputReas.name = 'moveDiagnosticsToNoInformada';
                        inputReas.value = 'true';
                        form.appendChild(inputReas);
                    }
                    document.body.appendChild(form);
                    form.submit();
                } else {
                    window.location.href = '/dashboard/instituciones';
                }
            });
        }

        // ---------- CREACIÓN DE INSTITUCIÓN ----------
        const createForm = document.getElementById('createInstitutionForm');
        if(createForm) {
            createForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const nombreInput = document.getElementById('createNombre');
                const nombre = nombreInput.value.trim();
                if(!nombre) {
                    showToast('error', 'Nombre requerido', 'El nombre de la institución no puede estar vacío.');
                    return;
                }
                const confirm = await Swal.fire({
                    title: 'Crear institución',
                    text: `¿Deseas registrar "${nombre}"?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#284b63',
                    confirmButtonText: 'Sí, crear',
                    cancelButtonText: 'Cancelar'
                });
                if(confirm.isConfirmed) {
                    createForm.submit();
                }
            });
        }

        // ---------- EDICIÓN DE INSTITUCIÓN (confirmación y validación) ----------
        const editForms = document.querySelectorAll('.editInstitutionForm');
        editForms.forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const nombreInput = form.querySelector('input[name="nombre"]');
                const nuevoNombre = nombreInput.value.trim();
                if(!nuevoNombre) {
                    showToast('error', 'Nombre inválido', 'El nombre no puede estar vacío.');
                    return;
                }
                const estadoSelect = form.querySelector('select[name="activo"]');
                const nuevoEstado = estadoSelect.value === 'true' ? 'Activo' : 'Inactivo';
                const confirm = await Swal.fire({
                    title: 'Actualizar institución',
                    html: `¿Guardar cambios?<br><strong>Nombre:</strong> ${nuevoNombre}<br><strong>Estado:</strong> ${nuevoEstado}`,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonColor: '#284b63',
                    confirmButtonText: 'Actualizar'
                });
                if(confirm.isConfirmed) {
                    form.submit();
                }
            });
        });

        // ---------- ELIMINACIÓN DE INSTITUCIÓN (sin dependencias conocidas previamente) ----------
        const deleteForms = document.querySelectorAll('.deleteInstitutionForm');
        deleteForms.forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const instId = form.dataset.id;
                // Primero preguntar confirmación simple. Si el backend detecta dependencias, redirigirá con el flag pendingDelete
                const confirm = await Swal.fire({
                    title: 'Eliminar institución',
                    text: '¿Estás seguro de que deseas eliminar esta institución? Si tiene consultorios o diagnósticos asociados, se te presentarán opciones adicionales.',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#b53a3a',
                    confirmButtonText: 'Sí, eliminar',
                    cancelButtonText: 'Cancelar'
                });
                if(confirm.isConfirmed) {
                    form.submit();
                }
            });
        });
    })();
</script>
</body>
</html>
