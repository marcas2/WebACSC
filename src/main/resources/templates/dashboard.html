<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Médico</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f3f4f8;
            color: #1a1a2e;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1.5rem 2rem 0;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 4px;
        }

        .meta { font-size: 13px; color: #666; }

        .logout-btn {
            font-size: 13px;
            color: #3266ad;
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid #c0d0ea;
            border-radius: 6px;
        }

        /* ── Metric cards ── */
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 1.25rem 2rem;
        }

        .metric {
            background: #fff;
            border-radius: 10px;
            padding: 14px 16px;
            border: 1px solid #eaeef5;
        }

        .metric-label {
            font-size: 12px;
            color: #888;
            margin: 0 0 6px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }

        .metric-value.blue   { color: #3266ad; }
        .metric-value.orange { color: #c47a20; }
        .metric-value.green  { color: #2d7a55; }

        /* ── Chart grid ── */
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            padding: 0 2rem 2rem;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 18px 20px;
            border: 1px solid #eaeef5;
        }

        .card-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .06em;
            color: #888;
            margin: 0 0 4px;
            text-transform: uppercase;
        }

        .card h2 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin: 0 0 14px;
        }

        .chart-wrap {
            position: relative;
            width: 100%;
            height: 220px;
        }

        /* ── Custom legend ── */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #555;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div>
        <h1>Dashboard médico</h1>
        <p class="meta">
            Bienvenido, <strong th:text="${username}"></strong>
            &nbsp;·&nbsp; Rol: <strong th:text="${role}"></strong>
        </p>
    </div>
    <a th:href="@{/auth/logout}" class="logout-btn">Cerrar sesión</a>
</div>

<!-- Paso: Notificar que no existen datos -->
<div th:if="${infoMessage}" style="
        margin: 2rem;
        padding: 16px 20px;
        background: #eef4ff;
        border: 1px solid #c0d0ea;
        border-radius: 10px;
        color: #3266ad;
        font-size: 14px;">
    ℹ️ <span th:text="${infoMessage}"></span>
</div>

<!-- Paso: Notificar datos incompletos -->
<div th:if="${errorMessage}" style="
        margin: 2rem;
        padding: 16px 20px;
        background: #fff4f0;
        border: 1px solid #f5c4b3;
        border-radius: 10px;
        color: #993c1d;
        font-size: 14px;">
    ⚠️ <span th:text="${errorMessage}"></span>
</div>

<!-- El resto del dashboard solo se muestra si el reporte está listo -->
<div th:if="${reportReady}">

    <!-- Metric summary cards -->
    <div class="metrics">
        <div class="metric">
            <p class="metric-label">Total valvulopatías</p>
            <p class="metric-value blue" th:text="${totalValvulopathies}">—</p>
        </div>
        <div class="metric">
            <p class="metric-label">Rango más afectado</p>
            <p class="metric-value orange" th:text="${topAgeRange}">—</p>
        </div>
        <div class="metric">
            <p class="metric-label">Con enfermedad de base</p>
            <p class="metric-value green" th:text="${diseaseBasePercent} + '%'">0%</p>
        </div>
    </div>

    <div class="charts">
        <div class="card">
            <p class="card-tag"></p>
            <h2>Valvulopatías por rango de edad</h2>
            <div class="chart-wrap"><canvas id="ageChart"></canvas></div>
            <div class="legend" id="ageLegend"></div>
        </div>

        <div class="card">
            <p class="card-tag"></p>
            <h2>Valvulopatías por género</h2>
            <div class="chart-wrap" style="height:200px"><canvas id="genderChart"></canvas></div>
            <div class="legend" id="genderLegend"></div>
        </div>

        <div class="card">
            <p class="card-tag"></p>
            <h2>Valvulopatías y enfermedades de base</h2>
            <div class="chart-wrap" style="height:200px"><canvas id="diseaseChart"></canvas></div>
            <div class="legend" id="diseaseLegend"></div>
        </div>
    </div>

    <div style="padding: 0 2rem 2rem; display: flex; gap: 12px; align-items: center;">
        <span style="font-size: 13px; color: #888;">Exportar reporte:</span>
        <a th:href="@{/dashboard/export(format='pdf')}"
           style="padding: 7px 16px; font-size: 13px; border-radius: 6px;
                  background: #3266ad; color: #fff; text-decoration: none;">
            Descargar PDF
        </a>
        <a th:href="@{/dashboard/export(format='excel')}"
           style="padding: 7px 16px; font-size: 13px; border-radius: 6px;
                  background: #2d7a55; color: #fff; text-decoration: none;">
            Descargar Excel
        </a>
    </div>

    <script th:inline="javascript">
        const ageLabels     = /*[[${ageLabels}]]*/ [];
        const ageData       = /*[[${ageData}]]*/ [];
        const genderLabels  = /*[[${genderLabels}]]*/ [];
        const genderData    = /*[[${genderData}]]*/ [];
        const diseaseLabels = /*[[${diseaseLabels}]]*/ [];
        const diseaseData   = /*[[${diseaseData}]]*/ [];

        const PALETTES = {
            age:     ['#4A7ED4', '#6AACDC', '#85C9D6', '#A5DEAF'],
            gender:  ['#5B6FD4', '#CC6B8E'],
            disease: ['#E2734A', '#7CC4A8'],
        };

        const gridColor = 'rgba(0,0,0,0.05)';
        const tickColor = '#888';

        function buildLegend(containerId, labels, colors, data) {
            const total = data.reduce((a, b) => a + b, 0);
            const el = document.getElementById(containerId);
            el.innerHTML = labels.map((l, i) => {
                const pct = total > 0 ? Math.round(data[i] / total * 100) : 0;
                return `<span class="legend-item">
                    <span class="legend-dot" style="background:${colors[i]}"></span>
                    ${l} <strong style="color:#1a1a2e">${pct}%</strong>
                </span>`;
            }).join('');
        }

        new Chart(document.getElementById('ageChart'), {
            type: 'bar',
            data: {
                labels: ageLabels,
                datasets: [{
                    label: 'Pacientes',
                    data: ageData,
                    backgroundColor: PALETTES.age,
                    borderRadius: 6,
                    borderSkipped: false,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} pacientes` } }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: tickColor, font: { size: 12 } },
                        border: { display: false },
                    },
                    y: {
                        grid: { color: gridColor },
                        ticks: { color: tickColor, font: { size: 12 }, maxTicksLimit: 5 },
                        border: { display: false },
                    }
                }
            }
        });
        buildLegend('ageLegend', ageLabels, PALETTES.age, ageData);

        new Chart(document.getElementById('genderChart'), {
            type: 'doughnut',
            data: {
                labels: genderLabels,
                datasets: [{
                    data: genderData,
                    backgroundColor: PALETTES.gender,
                    borderWidth: 0,
                    hoverOffset: 6,
                    spacing: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '68%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                return ` ${ctx.parsed} pacientes (${Math.round(ctx.parsed / total * 100)}%)`;
                            }
                        }
                    }
                }
            }
        });
        buildLegend('genderLegend', genderLabels, PALETTES.gender, genderData);

        new Chart(document.getElementById('diseaseChart'), {
            type: 'doughnut',
            data: {
                labels: diseaseLabels,
                datasets: [{
                    data: diseaseData,
                    backgroundColor: PALETTES.disease,
                    borderWidth: 0,
                    hoverOffset: 6,
                    spacing: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '68%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                return ` ${ctx.parsed} pacientes (${Math.round(ctx.parsed / total * 100)}%)`;
                            }
                        }
                    }
                }
            }
        });
        buildLegend('diseaseLegend', diseaseLabels, PALETTES.disease, diseaseData);
    </script>

</div>
</body>
</html>
