<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <title>Gestión de focos · Panel administrativo</title>

    <!-- Tailwind CSS + Configuración -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui']
                    },
                    colors: {
                        brand: {
                            50: '#f4f8fb',
                            100: '#e8f0f7',
                            200: '#d4e4f0',
                            300: '#aecedf',
                            400: '#7faec8',
                            500: '#568eaf',
                            600: '#3d7293',
                            700: '#2f5b77',
                            800: '#284b63',
                            900: '#243f53'
                        }
                    },
                    boxShadow: {
                        soft: '0 18px 45px rgba(36, 63, 83, 0.08)',
                        card: '0 12px 30px rgba(36, 63, 83, 0.07)'
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body {
            background: radial-gradient(circle at top left, rgba(212, 228, 240, 0.4) 0%, #ffffff 70%);
        }
        *:focus-visible {
            outline: 2px solid #3d7293;
            outline-offset: 2px;
            border-radius: 8px;
        }
        .card-hover {
            transition: all 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.08);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #eef2f6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #7faec8; border-radius: 10px; }
    </style>
</head>
<body class="font-sans text-slate-700 antialiased">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">
    <!-- Encabezado -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8 pb-3 border-b border-slate-200">
        <div>
            <div class="flex items-center gap-2 text-brand-600 text-sm font-semibold mb-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                Catálogo de focos
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-brand-900">Gestión de focos</h1>
            <p class="text-sm text-slate-500 mt-1">Administra los focos anatómicos para diagnósticos cardíacos</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <a th:href="@{/dashboard}" 
               class="inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition-all hover:border-brand-300 hover:text-brand-800">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12h2m0 0h14m-14 0v6m0-6H3m16 0h2M5 12v6m0 0H3m2 0h2m12-6v6m0 0h-2m2 0h2M9 12h6" /></svg>
                Dashboard
            </a>
        </div>
    </div>

    <!-- Mensajes flash (se mostrarán con SweetAlert automáticamente) -->
    <div th:if="${success}" id="flashSuccess" th:data-message="${success}" class="hidden"></div>
    <div th:if="${error}" id="flashError" th:data-message="${error}" class="hidden"></div>

    <!-- Tarjeta: Crear foco -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-card p-6 md:p-7 mb-8 card-hover">
        <h2 class="text-xl font-extrabold text-slate-900 flex items-center gap-2 mb-5">
            <svg class="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            Nuevo foco
        </h2>
        <form id="createFocoForm" th:action="@{/dashboard/focos/create}" method="post" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 items-end">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Nombre del foco</label>
                <input type="text" name="nombre" id="createNombre" placeholder="Ej. Mitral" required
                       class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-400 focus:ring-brand-300 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Código</label>
                <input type="text" name="codigo" id="createCodigo" placeholder="Ej. MT" required
                       class="w-full rounded-xl border-slate-200 shadow-sm focus:border-brand-400 focus:ring-brand-300 transition">
                <p class="text-xs text-slate-400 mt-1">Identificador único del foco</p>
            </div>
            <div class="flex justify-end">
                <button type="submit" class="inline-flex items-center gap-2 rounded-xl bg-brand-800 px-6 py-2.5 text-sm font-bold text-white shadow-md hover:bg-brand-700 transition-all hover:-translate-y-0.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    Crear foco
                </button>
            </div>
        </form>
    </div>

    <!-- Tabla de focos responsiva -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-card overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-brand-800">
                    <tr>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">ID</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Nombre</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Código</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Editar</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold text-white uppercase tracking-wider">Eliminar</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 bg-white">
                    <tr th:each="foco : ${focos}" class="hover:bg-slate-50 transition">
                        <td class="px-5 py-4 text-sm font-medium text-slate-900" th:text="${foco.id}">1</td>
                        <td class="px-5 py-4 text-sm font-medium" th:text="${foco.nombre}">Mitral</td>
                        <td class="px-5 py-4 text-sm font-mono text-slate-600" th:text="${foco.codigo}">MT</td>
                        <!-- Editar -->
                        <td class="px-5 py-4">
                            <form class="editFocoForm" th:action="@{/dashboard/focos/{id}/edit(id=${foco.id})}" method="post" th:data-id="${foco.id}">
                                <div class="flex flex-col sm:flex-row gap-2 items-start sm:items-center">
                                    <input type="text" name="nombre" th:value="${foco.nombre}" required
                                           class="rounded-lg border-slate-200 text-sm w-28 md:w-32 focus:ring-brand-300">
                                    <input type="text" name="codigo" th:value="${foco.codigo}" required
                                           class="rounded-lg border-slate-200 text-sm w-24 md:w-28 focus:ring-brand-300">
                                    <button type="submit" class="edit-btn inline-flex items-center gap-1 rounded-lg bg-brand-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-brand-700 transition">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                        Guardar
                                    </button>
                                </div>
                            </form>
                        </td>
                        <!-- Eliminar -->
                        <td class="px-5 py-4">
                            <form class="deleteFocoForm" th:action="@{/dashboard/focos/{id}/delete(id=${foco.id})}" method="post" th:data-id="${foco.id}">
                                <button type="submit" class="delete-btn inline-flex items-center gap-1 rounded-lg bg-red-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-red-700 transition">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${focos.isEmpty()}">
                        <td colspan="5" class="px-5 py-8 text-center text-slate-400">
                            <svg class="mx-auto h-10 w-10 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                            No hay focos registrados
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        // Helper: mostrar toast (notificación flotante)
        function showToast(icon, title, text = '') {
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: icon,
                title: title,
                text: text,
                showConfirmButton: false,
                timer: 4000,
                timerProgressBar: true,
                background: '#fff',
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer);
                    toast.addEventListener('mouseleave', Swal.resumeTimer);
                }
            });
        }

        // Mostrar mensajes flash del backend (success/error)
        const flashSuccess = document.getElementById('flashSuccess');
        if(flashSuccess && flashSuccess.dataset.message) {
            showToast('success', '¡Éxito!', flashSuccess.dataset.message);
        }
        const flashError = document.getElementById('flashError');
        if(flashError && flashError.dataset.message) {
            showToast('error', 'Error', flashError.dataset.message);
        }

        // ---------- CREACIÓN DE FOCO (validaciones) ----------
        const createForm = document.getElementById('createFocoForm');
        if(createForm) {
            createForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const nombre = document.getElementById('createNombre').value.trim();
                const codigo = document.getElementById('createCodigo').value.trim();

                // Validaciones exhaustivas
                if(!nombre) {
                    showToast('error', 'Nombre requerido', 'El nombre del foco no puede estar vacío.');
                    return;
                }
                if(nombre.length < 2) {
                    showToast('error', 'Nombre demasiado corto', 'El nombre debe tener al menos 2 caracteres.');
                    return;
                }
                if(!codigo) {
                    showToast('error', 'Código requerido', 'Debes ingresar un código único para el foco.');
                    return;
                }
                if(codigo.length < 2) {
                    showToast('error', 'Código demasiado corto', 'El código debe tener al menos 2 caracteres.');
                    return;
                }
                if(!/^[a-zA-Z0-9_\-]+$/.test(codigo)) {
                    showToast('error', 'Código inválido', 'El código solo puede contener letras, números, guiones y guiones bajos.');
                    return;
                }

                const confirm = await Swal.fire({
                    title: 'Crear nuevo foco',
                    html: `¿Deseas registrar el foco "<strong>${escapeHtml(nombre)}</strong>" con código <strong>${escapeHtml(codigo)}</strong>?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#284b63',
                    confirmButtonText: 'Sí, crear',
                    cancelButtonText: 'Cancelar'
                });
                if(confirm.isConfirmed) {
                    createForm.submit();
                }
            });
        }

        // ---------- EDICIÓN DE FOCO (confirmación y validación) ----------
        const editForms = document.querySelectorAll('.editFocoForm');
        editForms.forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const nombreInput = form.querySelector('input[name="nombre"]');
                const codigoInput = form.querySelector('input[name="codigo"]');
                const nuevoNombre = nombreInput.value.trim();
                const nuevoCodigo = codigoInput.value.trim();

                if(!nuevoNombre || !nuevoCodigo) {
                    showToast('error', 'Datos incompletos', 'Nombre y código son obligatorios.');
                    return;
                }
                if(nuevoNombre.length < 2) {
                    showToast('error', 'Nombre demasiado corto', 'El nombre debe tener al menos 2 caracteres.');
                    return;
                }
                if(nuevoCodigo.length < 2) {
                    showToast('error', 'Código demasiado corto', 'El código debe tener al menos 2 caracteres.');
                    return;
                }
                if(!/^[a-zA-Z0-9_\-]+$/.test(nuevoCodigo)) {
                    showToast('error', 'Código inválido', 'El código solo puede contener letras, números, guiones y guiones bajos.');
                    return;
                }

                const confirm = await Swal.fire({
                    title: 'Actualizar foco',
                    html: `<div class="text-left">
                            <p><strong>Nombre:</strong> ${escapeHtml(nuevoNombre)}</p>
                            <p><strong>Código:</strong> ${escapeHtml(nuevoCodigo)}</p>
                           </div>`,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonColor: '#284b63',
                    confirmButtonText: 'Guardar cambios',
                    cancelButtonText: 'Cancelar'
                });
                if(confirm.isConfirmed) {
                    form.submit();
                }
            });
        });

        // ---------- ELIMINACIÓN DE FOCO (con advertencia de dependencias) ----------
        const deleteForms = document.querySelectorAll('.deleteFocoForm');
        deleteForms.forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const focoId = form.dataset.id;
                // Obtener nombre del foco desde la fila para mostrarlo (opcional)
                const row = form.closest('tr');
                const nombreFoco = row ? row.querySelector('td:nth-child(2)')?.innerText : 'este foco';
                
                const confirm = await Swal.fire({
                    title: 'Eliminar foco',
                    html: `¿Estás seguro de que deseas eliminar el foco "<strong>${escapeHtml(nombreFoco)}</strong>"?<br><span class="text-sm text-slate-500">Esta acción puede afectar diagnósticos asociados.</span>`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#b53a3a',
                    confirmButtonText: 'Sí, eliminar',
                    cancelButtonText: 'Cancelar'
                });
                if(confirm.isConfirmed) {
                    // Si el backend detecta que el foco tiene diagnósticos asociados, devolverá un error
                    // y se mostrará mediante el flash. No se requiere lógica adicional aquí.
                    form.submit();
                }
            });
        });

        // Función auxiliar para escapar HTML y evitar XSS en modales
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
    })();
</script>
</body>
</html>
