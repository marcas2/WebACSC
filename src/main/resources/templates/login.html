<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h2>Iniciar Sesión</h2>

    <div th:if="${param.registered}" style="color:green">
        Registro exitoso. Por favor inicia sesión.
    </div>
    <div th:if="${param.logout}" style="color:blue">
        Sesión cerrada correctamente.
    </div>
    <div th:if="${error}" style="color:red" th:text="${error}"></div>

    <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
        <div>
            <label>Usuario:</label>
            <input type="text" th:field="*{username}" required/>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red"></span>
        </div>
        <div>
            <label>Contraseña:</label>
            <input type="password" th:field="*{password}" required/>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></span>
        </div>
        <button type="submit">Ingresar</button>
    </form>

    <p>¿No tienes cuenta? <a th:href="@{/auth/register}">Regístrate aquí</a></p>
</body>
</html>
